# Nginx — Servidor STAGING + SCRAPER
# Acceso restringido por IP (solo el equipo de desarrollo).
# Reemplaza <dominio-staging> y <IP-EQUIPO-DESARROLLO>.

upstream medforge_legacy {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream medforge_laravel {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80;
    server_name <dominio-staging>;

    # Restringir acceso solo al equipo de desarrollo
    allow <IP-EQUIPO-DESARROLLO>;
    allow 127.0.0.1;
    deny all;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    proxy_read_timeout 120s;

    location = /health {
        proxy_pass http://medforge_legacy/auth/login;
    }

    location = /v2/health {
        proxy_pass http://medforge_laravel;
    }

    location ^~ /v2/ {
        proxy_pass http://medforge_laravel;
    }

    location / {
        proxy_pass http://medforge_legacy;
    }

    location ~ /\.(env|git|htpasswd) {
        deny all;
    }
}
