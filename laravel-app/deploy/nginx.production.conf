# Nginx — Servidor PRODUCCIÓN
# Reemplaza <dominio-produccion> y las rutas de certificados SSL.

upstream medforge_legacy {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream medforge_laravel {
    server 127.0.0.1:8081;
    keepalive 32;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name <dominio-produccion>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name <dominio-produccion>;

    ssl_certificate     /etc/letsencrypt/live/<dominio-produccion>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<dominio-produccion>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    proxy_read_timeout 60s;

    # Health checks
    location = /health {
        proxy_pass http://medforge_legacy/auth/login;
    }

    location = /v2/health {
        proxy_pass http://medforge_laravel;
    }

    # Laravel v2
    location ^~ /v2/ {
        proxy_pass http://medforge_laravel;
    }

    # Legacy PHP
    location / {
        proxy_pass http://medforge_legacy;
    }

    # Bloquear acceso directo a archivos sensibles
    location ~ /\.(env|git|htpasswd) {
        deny all;
    }
}
