<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oportunidades Calientes — MedForge CIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #1a2744;
  --navy-light:  #243256;
  --accent:      #2563eb;
  --accent-soft: #dbeafe;
  --red:         #dc2626;
  --red-soft:    #fef2f2;
  --red-mid:     #fecaca;
  --orange:      #ea580c;
  --orange-soft: #fff7ed;
  --orange-mid:  #fed7aa;
  --yellow:      #d97706;
  --yellow-soft: #fffbeb;
  --yellow-mid:  #fde68a;
  --green:       #059669;
  --green-soft:  #f0fdf4;
  --green-mid:   #bbf7d0;
  --purple:      #7c3aed;
  --purple-soft: #ede9fe;
  --purple-mid:  #c4b5fd;
  --gray-50:     #f8fafc;
  --gray-100:    #f1f5f9;
  --gray-200:    #e2e8f0;
  --gray-300:    #cbd5e1;
  --gray-400:    #94a3b8;
  --gray-500:    #64748b;
  --gray-600:    #475569;
  --gray-700:    #334155;
  --gray-800:    #1e293b;
  --mono:        'IBM Plex Mono', monospace;
  --sans:        'DM Sans', sans-serif;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
  --shadow-md:   0 4px 12px rgba(0,0,0,.10);
  --shadow-lg:   0 8px 30px rgba(0,0,0,.14);
  --radius:      8px;
  --radius-sm:   5px;
}

html, body { height: 100%; font-family: var(--sans); font-size: 13px; color: var(--gray-800); background: #eef2f7; }
#root { height: 100%; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 99px; }

/* ── Tabs ── */
.tab-bar {
  background: var(--navy-light);
  display: flex;
  gap: 2px;
  padding: 0 20px;
  flex-shrink: 0;
}
.tab-btn {
  height: 40px;
  padding: 0 14px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.5);
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab-btn:hover { color: rgba(255,255,255,.8); }
.tab-btn.active { color: #fff; border-bottom-color: #60a5fa; }
.tab-count {
  padding: 1px 6px;
  border-radius: 99px;
  font-size: 10.5px;
  font-weight: 700;
  font-family: var(--mono);
}
.tab-btn.active .tab-count-critical { background: rgba(220,38,38,.4); color: #fca5a5; }
.tab-btn.active .tab-count-reminder { background: rgba(234,88,12,.4); color: #fdba74; }
.tab-btn .tab-count { background: rgba(255,255,255,.1); color: rgba(255,255,255,.6); }

/* ── Header ── */
.hd {
  background: var(--navy);
  color: #fff;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 52px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.hd-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hd-logo-mark {
  width: 26px; height: 26px;
  background: linear-gradient(135deg,#3b82f6,#1d4ed8);
  border-radius: 6px;
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  color: #fff;
  box-shadow: 0 0 0 2px rgba(255,255,255,.15);
}
.hd-wordmark { font-size: 13px; font-weight: 600; opacity: .9; }
.hd-divider  { width: 1px; height: 20px; background: rgba(255,255,255,.18); flex-shrink: 0; }
.hd-title    { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
.hd-title span { opacity: .45; font-size: 12px; }
.hd-pills { display: flex; gap: 5px; align-items: center; }
.hd-pill {
  padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 700; font-family: var(--mono);
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}
.hd-pill.critical { background: rgba(220,38,38,.28); color: #fca5a5; }
.hd-pill.risk     { background: rgba(217,119,6,.28);  color: #fcd34d; }
.hd-pill.reminder { background: rgba(234,88,12,.30);  color: #fdba74; border: 1px solid rgba(234,88,12,.4); }
.hd-pill.normal   { background: rgba(255,255,255,.1); color: rgba(255,255,255,.65); }
.hd-pill.unassign { background: rgba(239,68,68,.35);  color: #fef2f2; border: 1px solid rgba(239,68,68,.45); }
.hd-ts { font-size: 10.5px; font-family: var(--mono); opacity: .4; white-space: nowrap; }
.hd-refresh {
  width: 28px; height: 28px; border: none;
  background: rgba(255,255,255,.1); border-radius: 6px;
  cursor: pointer; display: grid; place-items: center;
  color: rgba(255,255,255,.75); font-size: 14px;
  transition: background .15s;
  flex-shrink: 0;
}
.hd-refresh:hover { background: rgba(255,255,255,.18); }
.hd-refresh.spinning { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filter bar ── */
.fb {
  background: #fff; border-bottom: 1px solid var(--gray-200);
  padding: 0 20px; height: 42px;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; overflow-x: auto;
}
.fb label { font-size: 10.5px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.fb select {
  height: 26px; padding: 0 8px;
  border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
  font-family: var(--sans); font-size: 12px; color: var(--gray-700);
  background: var(--gray-50); cursor: pointer; outline: none;
}
.fb select:focus { border-color: var(--accent); }
.fb-sep { width: 1px; height: 18px; background: var(--gray-200); flex-shrink: 0; }
.fb-clear {
  height: 26px; padding: 0 9px;
  border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
  font-family: var(--sans); font-size: 11.5px; color: var(--gray-500);
  background: transparent; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.fb-clear:hover { background: var(--gray-100); }

/* ── Main layout ── */
.main {
  flex: 1; display: grid; grid-template-columns: 1fr 256px;
  min-height: 0; overflow: hidden;
}
.tp {
  overflow-y: auto; background: var(--gray-50);
  padding: 14px 16px; display: flex; flex-direction: column; gap: 14px;
}

/* ── Section headers ── */
.sec-hdr { display: flex; align-items: center; gap: 7px; padding: 0; }
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-hdr h3 { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .9px; }
.sec-hdr .sec-count {
  font-family: var(--mono); font-size: 10.5px; font-weight: 700;
  padding: 1px 6px; border-radius: 99px;
}
.sec-critical .sec-dot { background: var(--red); }
.sec-critical h3       { color: var(--red); }
.sec-critical .sec-count { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.sec-reminder .sec-dot { background: var(--orange); }
.sec-reminder h3       { color: var(--orange); }
.sec-reminder .sec-count { background: var(--orange-soft); color: var(--orange); border: 1px solid var(--orange-mid); }
.sec-risk    .sec-dot { background: var(--yellow); }
.sec-risk    h3       { color: var(--yellow); }
.sec-risk    .sec-count { background: var(--yellow-soft); color: var(--yellow); border: 1px solid var(--yellow-mid); }
.sec-normal  .sec-dot { background: var(--green); }
.sec-normal  h3       { color: var(--green); }
.sec-normal  .sec-count { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-mid); }

/* ── Opportunity card ── */
.opp-card {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--gray-200); overflow: hidden;
  transition: box-shadow .15s, transform .15s;
  cursor: pointer; animation: fadeUp .22s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.opp-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.opp-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-md); }
.opp-card.critical { border-left: 3px solid var(--red); background: linear-gradient(to right,var(--red-soft) 0%,#fff 55%); }
.opp-card.reminder { border-left: 3px solid var(--orange); background: linear-gradient(to right,var(--orange-soft) 0%,#fff 55%); }
.opp-card.risk     { border-left: 3px solid var(--yellow); background: linear-gradient(to right,var(--yellow-soft) 0%,#fff 55%); }

.opp-body {
  padding: 10px 13px;
  display: grid;
  grid-template-columns: 185px 1fr 100px 118px 138px 130px 130px;
  gap: 8px; align-items: center; min-width: 0;
}

/* Patient col */
.patient-name { font-weight: 600; font-size: 13px; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.patient-hc {
  display: inline-flex; align-items: center; gap: 2px; margin-top: 2px;
  padding: 1px 5px; background: var(--accent-soft); border: 1px solid #bfdbfe;
  border-radius: 4px; font-size: 10px; font-family: var(--mono); color: #1d4ed8; font-weight: 600;
}
.no-hc { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
.score-mini { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.score-bar  { flex: 1; height: 2px; background: var(--gray-200); border-radius: 99px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 99px; }
.score-lbl  { font-size: 9px; font-family: var(--mono); font-weight: 700; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap;
}
.badge-source-ads      { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
.badge-source-organic  { background: var(--green-soft); color: #065f46; border: 1px solid var(--green-mid); }
.badge-source-return   { background: var(--purple-soft); color: #5b21b6; border: 1px solid var(--purple-mid); }
.badge-source-campaign { background: var(--orange-soft); color: #92400e; border: 1px solid var(--orange-mid); }
.badge-intent-booking  { background: var(--accent-soft); color: #1d4ed8; border: 1px solid #bfdbfe; }
.badge-intent-reschedule { background: var(--purple-soft); color: #7e22ce; border: 1px solid var(--purple-mid); }
.badge-intent-cancel   { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.badge-intent-info     { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
.origin-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

/* Wait */
.wait-badge {
  display: inline-flex; align-items: baseline; gap: 2px;
  padding: 3px 8px; border-radius: 99px;
  font-family: var(--mono); font-size: 12px; font-weight: 700; line-height: 1;
}
.wait-badge sub { font-size: 8.5px; opacity: .75; font-weight: 500; }
.wait-critical { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.wait-risk     { background: var(--yellow-soft); color: var(--yellow); border: 1px solid var(--yellow-mid); }
.wait-ok       { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-mid); }
.wait-reason   { font-size: 9.5px; color: var(--gray-500); margin-top: 2px; text-align: center; }

/* Topic */
.topic-badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10.5px; font-weight: 500; font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 108px;
}
.topic-captacion   { background: var(--accent-soft); color: #1e40af; }
.topic-agenda_disp { background: var(--orange-soft); color: #92400e; }
.topic-faq         { background: var(--gray-100); color: var(--gray-600); }
.topic-operacion   { background: var(--purple-soft); color: #6b21a8; }

/* Meta window */
.meta-open   { font-size: 10.5px; color: var(--green); font-weight: 500; }
.meta-warn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; background: var(--yellow-soft); border: 1px solid var(--yellow-mid);
  border-radius: 99px; font-size: 10.5px; font-weight: 600; color: var(--yellow); white-space: nowrap;
}
.meta-critical-warn { background: var(--red-soft); border-color: var(--red-mid); color: var(--red); }
.meta-label { font-size: 9.5px; color: var(--gray-400); margin-top: 2px; }

/* Agent */
.col-agent { display: flex; align-items: center; gap: 6px; min-width: 0; }
.agent-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: grid; place-items: center; font-size: 9.5px; font-weight: 700;
  color: #fff; flex-shrink: 0; position: relative;
}
.agent-avatar::after {
  content: ''; position: absolute; bottom: -1px; right: -1px;
  width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #fff;
}
.agent-available::after { background: #22c55e; }
.agent-busy::after      { background: #ef4444; }
.agent-away::after      { background: #f59e0b; }
.unassigned-slot {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px dashed var(--gray-300); display: grid; place-items: center;
  color: var(--gray-400); font-size: 13px; flex-shrink: 0;
}
.agent-name   { font-size: 11.5px; font-weight: 500; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-status { font-size: 9.5px; color: var(--gray-400); }
.unassigned-label { font-size: 11.5px; color: var(--gray-400); font-style: italic; }

/* Actions */
.col-actions { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
.btn {
  height: 26px; padding: 0 9px; border-radius: var(--radius-sm);
  font-family: var(--sans); font-size: 11.5px; font-weight: 500;
  cursor: pointer; border: none; transition: all .1s; white-space: nowrap;
  display: flex; align-items: center; gap: 3px; position: relative;
}
.btn-primary   { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
.btn-secondary:hover { background: var(--gray-200); }
.btn-ghost     { background: transparent; color: var(--accent); border: 1px solid #bfdbfe; }
.btn-ghost:hover { background: var(--accent-soft); }
.btn-orange    { background: var(--orange); color: #fff; }
.btn-orange:hover { background: #c2410c; }

/* Reasons strip */
.reasons-strip {
  padding: 4px 13px 7px 16px; border-top: 1px solid var(--gray-100);
  display: flex; gap: 5px; flex-wrap: wrap; background: rgba(0,0,0,.015);
}
.reason-tag {
  font-size: 10px; padding: 1.5px 6px; border-radius: 99px;
  font-weight: 500; display: flex; align-items: center; gap: 3px;
}
.reason-critical { background: var(--red-soft); color: var(--red); }
.reason-orange   { background: var(--orange-soft); color: var(--orange); }
.reason-warn     { background: var(--yellow-soft); color: var(--yellow); }
.reason-info     { background: var(--gray-100); color: var(--gray-600); }

/* ── Reminder card ── */
.rem-card {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--orange-mid);
  border-left: 3px solid var(--orange);
  overflow: hidden; cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  animation: fadeUp .22s ease both;
  background: linear-gradient(to right,var(--orange-soft) 0%,#fff 55%);
}
.rem-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.rem-card.selected { box-shadow: 0 0 0 2px #fed7aa, var(--shadow-md); }
.rem-card.critical-appt { border-color: var(--red); border-left-color: var(--red); background: linear-gradient(to right,var(--red-soft) 0%,#fff 55%); }

.rem-body {
  padding: 10px 13px;
  display: grid;
  grid-template-columns: 185px 1fr 150px 150px 130px;
  gap: 8px; align-items: center; min-width: 0;
}

/* failure reason badge */
.fail-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 10.5px; font-weight: 600; font-family: var(--mono);
  white-space: nowrap;
}
.fail-location  { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
.fail-template  { background: var(--orange-soft); color: var(--orange); border: 1px solid var(--orange-mid); }
.fail-infra     { background: var(--purple-soft); color: var(--purple); border: 1px solid var(--purple-mid); }
.fail-unknown   { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }

.appt-time {
  font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--gray-800);
}
.appt-time-label { font-size: 9.5px; color: var(--gray-500); margin-top: 1px; }
.appt-soon { color: var(--red); }

/* ── Failure summary bar ── */
.fail-summary {
  background: #fff; border: 1px solid var(--orange-mid);
  border-radius: var(--radius); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.fail-summary-title { font-size: 11px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
.fail-summary-items { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
.fail-summary-item {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  transition: opacity .12s;
}
.fail-summary-item:hover { opacity: .8; }
.fail-count { font-family: var(--mono); font-weight: 800; }
.fail-summary-item.active { box-shadow: 0 0 0 2px currentColor; }

/* ── Dropdown ── */
.dropdown-wrap { position: relative; }
.dropdown-menu {
  position: absolute; right: 0; top: calc(100% + 4px); z-index: 50;
  background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); min-width: 195px; padding: 6px;
  animation: dropIn .12s ease both;
}
@keyframes dropIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
.dropdown-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); padding: 3px 7px 5px; }
.dropdown-item {
  display: grid; grid-template-columns: auto 1fr auto; gap: 7px; align-items: center;
  padding: 5px 7px; border-radius: var(--radius-sm); cursor: pointer; transition: background .1s;
}
.dropdown-item:hover { background: var(--gray-100); }

/* ── Toast ── */
.toast-wrap { position: fixed; bottom: 18px; right: 18px; z-index: 100; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast {
  pointer-events: all; background: var(--navy-light); color: #fff;
  padding: 9px 13px; border-radius: var(--radius); font-size: 12px; font-weight: 500;
  box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 7px;
  animation: toastIn .18s ease both; border-left: 3px solid var(--accent);
}
.toast.toast-orange { border-left-color: var(--orange); }
@keyframes toastIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateY(8px); } }
.toast-exit { animation: toastOut .18s ease forwards; }

/* ── Agent panel ── */
.ap { background: #fff; border-left: 1px solid var(--gray-200); display: flex; flex-direction: column; overflow: hidden; }
.ap-header { padding: 11px 13px 9px; border-bottom: 1px solid var(--gray-100); background: var(--navy); color: #fff; }
.ap-header h4 { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; opacity: .6; }
.ap-header p  { font-size: 13px; font-weight: 600; margin-top: 1px; }
.ap-list { flex: 1; overflow-y: auto; padding: 7px; display: flex; flex-direction: column; gap: 4px; }
.agent-card {
  padding: 8px 9px; border-radius: var(--radius-sm); border: 1px solid var(--gray-100);
  background: var(--gray-50); display: grid; grid-template-columns: auto 1fr auto;
  gap: 7px; align-items: center; transition: background .12s; cursor: pointer;
}
.agent-card:hover { background: var(--gray-100); }
.agent-card-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center; font-size: 10px; font-weight: 700;
  color: #fff; position: relative; flex-shrink: 0;
}
.agent-card-avatar::after {
  content: ''; position: absolute; bottom: 0; right: 0;

.load-mid  { background: var(--yellow); }

}
.contract-note strong { color: #93c5fd; display: block; margin-bottom: 3px; font-size: 11px; }

.empty h4 { font-size: 13px; font-weight: 600; color: var(--gray-600); }
.empty p  { font-size: 11.5px; margin-top: 3px; }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────────────────────────────────────
   CONTRATO DE ENDPOINT (Codex PR #401 + futuro)
   GET /v2/whatsapp/api/hot-opportunities
   Retorna { conversations: OppItem[], reminders: ReminderItem[], agents: AgentItem[] }

   OppItem (ya existe en serializeConversationSummary):
     conversation_id, wa_number, patient_name, patient_hc_number,
     source_category, initial_intent, patient_segment,
     handoff_topic, priority_score, waiting_minutes,
     assigned_user_id, assigned_user_name, assigned_user_status,
     last_message_at, meta_window_state, meta_window_minutes_left,
     priority_reasons[], requeued_count, priority_level

   ReminderItem (nuevo — PR #401 de Codex):
     reminder_id, wa_number, patient_name, patient_hc_number,
     appointment_date, appointment_doctor, appointment_sede,
     appointment_minutes_from_now,
     failure_reason: 'location_header_missing_coordinates'
                   | 'template_header_location_mismatch'
                   | 'whatsapp_messages_table_missing'
                   | string,
     failed_at, retry_count, conversation_id (nullable),
     template_code, window_state: 'open'|'needs_template'|'closed'

   AgentItem: id, name, initials, color, status, convs, unread, avg_resp

   Mientras Codex no expone el endpoint real, esta UI funciona
   con los mocks de REMINDERS_RAW y CONVS_RAW abajo.
───────────────────────────────────────────── */

/* ── Mock: conversations ── */

  { id:3, name:'Luis García',     hc:'08471', source:'Retorno',  intent:'reagendar', topic:'operacion_reagenda',          waitMin:12, agentId:null, metaState:'open',     metaMinLeft:null, score:82, reasons:['sin asignar 12 min','paciente retorno con HC'],                   requeued:0 },
  { id:4, name:'Carmen Vega',     hc:null,    source:'Ads',      intent:'información',topic:'faq_escalada',               waitMin:45, agentId:2,    metaState:'open',     metaMinLeft:null, score:45, reasons:['agente asignado'],                                                 requeued:0 },
  { id:5, name:'Roberto Silva',   hc:'05521', source:'Campaña',  intent:'agendar',   topic:'captacion_agendar',           waitMin:8,  agentId:null, metaState:'critical', metaMinLeft:45,   score:91, reasons:['sin asignar','ventana Meta expira en 45 min','intención booking'],  requeued:0 },
  { id:6, name:'María Fernanda',  hc:'11203', source:'Orgánico', intent:'agendar',   topic:'captacion_agendar',           waitMin:3,  agentId:3,    metaState:'open',     metaMinLeft:null, score:60, reasons:['recién asignado'],                                                  requeued:0 },

/* ── Mock: failed reminders (PR #401 Codex) ── */
const REMINDERS_RAW = [

    id: 'r1', name: 'Gabriela Torres', hc: '03291',

/* ── Helpers ── */
const FAILURE_LABELS = {
  location_header_missing_coordinates: 'Coord. faltantes',
  template_header_location_mismatch:   'Header incorrecto',
  whatsapp_messages_table_missing:     'Tabla ausente',
};
const FAILURE_CLASS = {
  location_header_missing_coordinates: 'fail-location',
  template_header_location_mismatch:   'fail-template',
  whatsapp_messages_table_missing:     'fail-infra',
};
const FAILURE_DESC = {
  location_header_missing_coordinates: 'El template espera coordenadas de ubicación pero no se enviaron. Requiere corregir payload del recordatorio.',
  template_header_location_mismatch:   'El header del template está configurado como LOCATION pero se envió tipo distinto (posiblemente UNKNOWN). PR #401 en revisión.',
  whatsapp_messages_table_missing:     'El servicio de recordatorios no encontró la tabla whatsapp_messages al intentar deduplicar. Error de infraestructura.',
};
function failClass(r) { return FAILURE_CLASS[r] || 'fail-unknown'; }
function failLabel(r) { return FAILURE_LABELS[r] || r; }

function getPriority(conv) {
  if (!conv.agentId && conv.waitMin > 20) return 'critical';
  if (conv.metaState === 'critical') return 'critical';
  if (conv.requeued >= 2) return 'critical';
  if (!conv.agentId && conv.waitMin >= 5) return 'risk';
  if (conv.metaState === 'warn') return 'risk';
  return 'normal';
}
function isRemCritical(rem) { return rem.apptMinutes <= 120; }
function scoreColor(s) { return s >= 80 ? 'var(--red)' : s >= 60 ? 'var(--yellow)' : 'var(--green)'; }
function loadClass(pct) { return pct >= 75 ? 'load-high' : pct >= 45 ? 'load-mid' : 'load-ok'; }
function loadPct(n, max=15) { return Math.min(100, Math.round(n/max*100)); }

const SOURCE_CLASS = { 'Ads':'badge-source-ads','Orgánico':'badge-source-organic','Retorno':'badge-source-return','Campaña':'badge-source-campaign' };
const INTENT_CLASS = { 'agendar':'badge-intent-booking','reagendar':'badge-intent-reschedule','cancelar':'badge-intent-cancel','información':'badge-intent-info' };
const TOPIC_LABELS = { captacion_agendar:'captación',agenda_sin_disponibilidad:'sin dispon.',faq_escalada:'faq escalada',operacion_reagenda:'reagenda' };
const TOPIC_CLASS  = { captacion_agendar:'topic-captacion',agenda_sin_disponibilidad:'topic-agenda_disp',faq_escalada:'topic-faq',operacion_reagenda:'topic-operacion' };
const SRC_EMOJI    = { Ads:'📣',Orgánico:'🌿',Retorno:'🔄',Campaña:'📢' };
const INT_EMOJI    = { agendar:'📅',reagendar:'🔃',cancelar:'✖️',información:'ℹ️' };

/* ── Dropdown ── */
function AgentDropdown({ agents, onSelect, onClose }) {
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="dropdown-menu" ref={ref}>
      <div className="dropdown-label">Asignar a agente</div>
      {[...agents].sort((a,b)=>a.convs-b.convs).map(a => (
        <div key={a.id} className="dropdown-item" onClick={()=>onSelect(a)}>
          <div style={{width:22,height:22,borderRadius:'50%',background:a.color,display:'grid',placeItems:'center',fontSize:8,fontWeight:700,color:'#fff',position:'relative',flexShrink:0}}>
            {a.initials}
            <span style={{position:'absolute',bottom:-1,right:-1,width:7,height:7,borderRadius:'50%',border:'1.5px solid #fff',background:a.status==='available'?'#22c55e':a.status==='busy'?'#ef4444':'#f59e0b'}}/>
          </div>
          <div><div style={{fontSize:11.5,fontWeight:600}}>{a.name}</div><div style={{fontSize:9.5,color:'var(--gray-500)'}}>{a.convs} conv · {a.resp}</div></div>
          <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--gray-500)'}}>{a.convs}</div>
        </div>
      ))}
    </div>
  );
}

/* ── Opp Card ── */
function OppCard({ conv, agents, priority, selected, onSelect, onAssign, onOpen }) {
  const [showDrop, setShowDrop] = useState(false);
  const agent = agents.find(a => a.id === conv.agentId);
  const waitClass = priority==='critical'?'wait-critical':priority==='risk'?'wait-risk':'wait-ok';
  const metaFmt = conv.metaMinLeft ? (conv.metaMinLeft>=60?`${Math.floor(conv.metaMinLeft/60)}h ${conv.metaMinLeft%60}min`:`${conv.metaMinLeft} min`) : null;
  const reasonPri = r => (r.includes('asignar')||r.includes('ventana')||r.includes('reencolado')) ? priority : 'info';
  return (
    <div className={`opp-card ${priority} ${selected?'selected':''}`} onClick={()=>onSelect(conv.id)} style={{animationDelay:`${conv.id*35}ms`}}>
      <div className="opp-body">
        <div>
          <div className="patient-name">{conv.name}</div>
          {conv.hc ? <div className="patient-hc">HC {conv.hc}</div> : <div className="no-hc">Sin HC</div>}
          <div className="score-mini">
            <div className="score-bar"><div className="score-fill" style={{width:`${conv.score}%`,background:scoreColor(conv.score)}}/></div>
            <span className="score-lbl" style={{color:scoreColor(conv.score)}}>{conv.score}</span>
          </div>
        </div>
        <div>
          <div className="origin-row">
            <span className={`badge ${SOURCE_CLASS[conv.source]||''}`}>{SRC_EMOJI[conv.source]} {conv.source}</span>
            <span className={`badge ${INTENT_CLASS[conv.intent]||''}`}>{INT_EMOJI[conv.intent]} {conv.intent}</span>
          </div>
        </div>
        <div style={{textAlign:'center'}}>
          <div className={`wait-badge ${waitClass}`}>{conv.waitMin}<sub>min</sub></div>
          <div className="wait-reason">en cola</div>
        </div>
        <div>
          <span className={`topic-badge ${TOPIC_CLASS[conv.topic]||'topic-faq'}`}>{TOPIC_LABELS[conv.topic]||conv.topic}</span>
          {conv.requeued>=2 && <div style={{fontSize:9.5,color:'var(--red)',marginTop:2,fontWeight:700}}>↩ requeue ×{conv.requeued}</div>}
        </div>
        <div style={{textAlign:'center'}}>
          {conv.metaState==='open' && <div className="meta-open">✓ Abierta</div>}
          {conv.metaState==='warn' && <div className="meta-warn">⏱ {metaFmt}</div>}
          {conv.metaState==='critical' && <div className="meta-warn meta-critical-warn">⚠ {metaFmt}</div>}
          <div className="meta-label">ventana Meta</div>
        </div>
        <div className="col-agent">
          {agent ? (
            <><div className={`agent-avatar agent-${agent.status}`} style={{background:agent.color}}>{agent.initials}</div>
              <div><div className="agent-name">{agent.name}</div><div className="agent-status">{agent.convs} conv</div></div></>
          ) : (
            <><div className="unassigned-slot">+</div><span className="unassigned-label">Sin asignar</span></>
          )}
        </div>
        <div className="col-actions" onClick={e=>e.stopPropagation()}>
          <div className="dropdown-wrap">
            {!agent
              ? <button className="btn btn-primary" onClick={()=>setShowDrop(v=>!v)}>Asignar ▾</button>
              : <button className="btn btn-secondary" onClick={()=>setShowDrop(v=>!v)}>Reasignar ▾</button>
            }
            {showDrop && <AgentDropdown agents={agents} onSelect={a=>{setShowDrop(false);onAssign(conv.id,a);}} onClose={()=>setShowDrop(false)}/>}
          </div>
          <button className="btn btn-ghost" onClick={()=>onOpen(conv.name)}>Abrir</button>
        </div>
      </div>
      <div className="reasons-strip">
        {conv.reasons.map((r,i)=>(
          <span key={i} className={`reason-tag reason-${reasonPri(r)}`}>
            {reasonPri(r)==='critical'?'🔴':reasonPri(r)==='risk'?'🟡':reasonPri(r)==='orange'?'🟠':'⚪'} {r}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ── Reminder Card ── */
function RemCard({ rem, agents, selected, onSelect, onOpen, onAssign, addToast }) {
  const [showDrop, setShowDrop] = useState(false);
  const [showDesc, setShowDesc] = useState(false);
  const isCritical = isRemCritical(rem);
  const hoursLeft = Math.floor(rem.apptMinutes / 60);
  const minsLeft  = rem.apptMinutes % 60;
  const timeLabel = rem.apptMinutes <= 60
    ? <span style={{color:'var(--red)',fontWeight:800}}>{rem.apptMinutes}min</span>
    : <span>{hoursLeft}h {minsLeft > 0 ? `${minsLeft}min` : ''}</span>;

  function handleRecontact() {
    addToast(`Recontacto manual iniciado para ${rem.name}`, '📞', true);
  }

  return (
    <div
      className={`rem-card ${isCritical?'critical-appt':''} ${selected===rem.id?'selected':''}`}
      onClick={()=>onSelect(rem.id)}
      style={{animationDelay:`${rem.id.charCodeAt(1)*30}ms`}}
    >
      <div className="rem-body">
        {/* Patient */}
        <div>
          <div className="patient-name">{rem.name}</div>
          {rem.hc ? <div className="patient-hc">HC {rem.hc}</div> : <div className="no-hc">Sin HC</div>}
          {isCritical && (
            <div style={{marginTop:3,fontSize:9.5,fontWeight:700,color:'var(--red)',display:'flex',alignItems:'center',gap:3}}>
              🔴 Cita muy pronto
            </div>
          )}
        </div>

        {/* Failure reason */}
        <div>
          <span className={`fail-badge ${failClass(rem.failureReason)}`}>
            ✕ {failLabel(rem.failureReason)}
          </span>
          <div
            style={{fontSize:9.5,color:'var(--gray-500)',marginTop:3,cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted'}}
            onClick={e=>{e.stopPropagation();setShowDesc(v=>!v);}}
          >{showDesc?'▲ Ocultar detalle':'▼ Ver detalle'}</div>
          {showDesc && (
            <div style={{fontSize:9.5,color:'var(--gray-600)',marginTop:4,padding:'5px 8px',background:'var(--gray-50)',borderRadius:4,border:'1px solid var(--gray-200)',lineHeight:1.5}}>
              {FAILURE_DESC[rem.failureReason] || rem.failureReason}
            </div>
          )}
          {rem.retries > 0 && (
            <div style={{fontSize:9.5,color:'var(--orange)',marginTop:2,fontWeight:600}}>↺ Reintentado {rem.retries}×</div>
          )}
        </div>

        {/* Appointment */}
        <div>
          <div className={`appt-time ${isCritical?'appt-soon':''}`}>{rem.apptDate}</div>
          <div className="appt-time-label">en {timeLabel}</div>
          <div style={{fontSize:9.5,color:'var(--gray-500)',marginTop:1}}>{rem.apptDoctor} · {rem.apptSede}</div>
        </div>

        {/* Window + template */}
        <div>
          {rem.windowState === 'open' && <div className="meta-open">✓ Ventana abierta</div>}
          {rem.windowState === 'needs_template' && <div className="meta-warn">📋 Requiere template</div>}
          {rem.windowState === 'closed' && <div style={{fontSize:10.5,color:'var(--red)',fontWeight:600}}>✕ Ventana cerrada</div>}
          <div className="meta-label">WhatsApp</div>
        </div>

        {/* Actions */}
        <div className="col-actions" onClick={e=>e.stopPropagation()}>
          <button className="btn btn-orange" onClick={handleRecontact}>
            📞 Recontactar
          </button>
          {rem.conversationId && (
            <button className="btn btn-ghost" onClick={()=>onOpen(rem.name)}>Abrir</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Failure summary bar ── */
function FailureSummary({ reminders, activeFilter, onFilter }) {
  const counts = {};
  reminders.forEach(r => { counts[r.failureReason] = (counts[r.failureReason]||0)+1; });
  const items = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const styleFor = (reason) => {
    if (reason.includes('location')) return { background:'#fef9c3', color:'#92400e', border:'1px solid #fde68a' };
    if (reason.includes('mismatch'))  return { background:'var(--orange-soft)', color:'var(--orange)', border:'1px solid var(--orange-mid)' };
    return { background:'var(--purple-soft)', color:'var(--purple)', border:'1px solid var(--purple-mid)' };
  };
  return (
    <div className="fail-summary">
      <span className="fail-summary-title">⚠ Fallos por causa</span>
      <div className="fail-summary-items">
        {items.map(([reason, count]) => (
          <div
            key={reason}
            className={`fail-summary-item ${activeFilter===reason?'active':''}`}
            style={styleFor(reason)}
            onClick={()=>onFilter(activeFilter===reason?null:reason)}
          >
            <span className="fail-count">{count}</span>
            <span>{failLabel(reason)}</span>
          </div>
        ))}
        <div style={{marginLeft:'auto',fontSize:10.5,color:'var(--gray-500)',alignSelf:'center',fontFamily:'var(--mono)'}}>
          Total: {reminders.length} fallidos · {reminders.filter(r=>isRemCritical(r)).length} críticos (cita &lt;2h)
        </div>
      </div>
    </div>
  );
}

/* ── Section ── */
function Section({ label, cls, items, children }) {
  if (!items || items.length === 0) return null;
  return (
    <div>
      <div className={`sec-hdr ${cls}`}>
        <span className="sec-dot"/>
        <h3>{label}</h3>
        <span className="sec-count">{items.length}</span>
      </div>
      <div style={{marginTop:5,display:'flex',flexDirection:'column',gap:5}}>{children}</div>
    </div>
  );
}

/* ── Agent Panel ── */
function AgentPanel({ agents }) {
  const total = agents.reduce((s,a)=>s+a.convs,0);
  const unread = agents.reduce((s,a)=>s+a.unread,0);
  return (
    <div className="ap">
      <div className="ap-header"><h4>Equipo activo</h4><p>{agents.length} agentes</p></div>
      <div className="ap-list">
        {[...agents].sort((a,b)=>a.convs-b.convs).map(a=>{
          const lp = loadPct(a.convs);
          return (
            <div className="agent-card" key={a.id}>
              <div className={`agent-card-avatar ac-${a.status}`} style={{background:a.color}}>{a.initials}</div>
              <div className="agent-card-info">
                <div className="agent-card-name">{a.name}</div>
                <div className={`agent-card-status ac-${a.status}-text`}>
                  {a.status==='available'?'● Disponible':a.status==='busy'?'● Ocupado':'● Ausente'}
                </div>
                <div className="agent-load-bar"><div className={`agent-load-fill ${loadClass(lp)}`} style={{width:`${lp}%`}}/></div>
              </div>
              <div className="agent-card-stats">
                <div className="stat-conv">{a.convs}</div>
                {a.unread>0 && <div className="stat-unread">{a.unread} no leídas</div>}
                <div className="stat-resp">⏱ {a.resp}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="ap-footer">
        Total: <strong>{total}</strong> asignadas · <strong>{unread}</strong> sin leer
      </div>
    </div>
  );
}

/* ── Toasts ── */
function Toasts({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.orange?'toast-orange':''} ${t.exit?'toast-exit':''}`}>
          <span>{t.icon}</span><span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ── Contract Note ── */
function ContractNote() {
  return (
    <div className="contract-note">
      <strong>📋 Contrato de endpoint para Codex — GET /v2/whatsapp/api/hot-opportunities</strong>
      La sección de recordatorios fallidos espera: <code>reminders[].failure_reason</code> con valores normalizados del PR #401:
      <code> location_header_missing_coordinates · template_header_location_mismatch · whatsapp_messages_table_missing</code>
      — más campos: <code>appointment_minutes_from_now, window_state, retry_count, conversation_id</code>.
      Esta UI funciona con mocks hasta que el endpoint esté disponible.
    </div>
  );
}

/* ── App ── */
function App() {
  const [convs,    setConvs]    = useState(CONVS_RAW);
  const [agents,   setAgents]   = useState(AGENTS_RAW);
  const [reminders]             = useState(REMINDERS_RAW);
  const [selected,  setSelected] = useState(null);
  const [activeTab, setActiveTab]= useState('oportunidades');
  const [spinning,  setSpinning] = useState(false);
  const [toasts,    setToasts]   = useState([]);
  const [ts, setTs]              = useState(()=>new Date());
  const [failFilter, setFailFilter] = useState(null);

  // Conversation filters
  const [fTopic,  setFTopic]  = useState('all');
  const [fSource, setFSource] = useState('all');
  const [fIntent, setFIntent] = useState('all');
  const [fAgent,  setFAgent]  = useState('all');
  const [fPrio,   setFPrio]   = useState('all');

  function addToast(msg, icon='✅', orange=false) {
    const id = Date.now() + Math.random();
    setToasts(p=>[...p,{id,msg,icon,orange}]);
    setTimeout(()=>{
      setToasts(p=>p.map(t=>t.id===id?{...t,exit:true}:t));
      setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),220);
    },3000);
  }

  function handleRefresh() {
    setSpinning(true);
    setTimeout(()=>{setSpinning(false);setTs(new Date());addToast('Bandeja actualizada','🔄');},800);
  }

  function handleAssign(convId, agent) {
    setConvs(p=>p.map(c=>c.id===convId?{...c,agentId:agent.id}:c));
    setAgents(p=>p.map(a=>a.id===agent.id?{...a,convs:a.convs+1}:a));
    const conv = convs.find(c=>c.id===convId);
    addToast(`${conv?.name} asignada a ${agent.name}`,'👤');
  }

  function handleOpen(name) { addToast(`Abriendo chat con ${name}`,'💬'); }

  // Filtered conversations
  const filtered = convs.filter(c=>{
    if (fTopic!=='all'  && c.topic  !==fTopic)  return false;
    if (fSource!=='all' && c.source !==fSource) return false;
    if (fIntent!=='all' && c.intent !==fIntent) return false;
    if (fPrio!=='all'   && getPriority(c)!==fPrio) return false;
    if (fAgent!=='all') {
      if (fAgent==='none' && c.agentId!==null) return false;
      if (fAgent!=='none' && String(c.agentId)!==fAgent) return false;
    }
    return true;
  });
  const critical = filtered.filter(c=>getPriority(c)==='critical').sort((a,b)=>b.score-a.score);
  const risk     = filtered.filter(c=>getPriority(c)==='risk').sort((a,b)=>b.score-a.score);
  const normal   = filtered.filter(c=>getPriority(c)==='normal').sort((a,b)=>b.score-a.score);
  const totalUnassigned = convs.filter(c=>!c.agentId).length;

  // Filtered reminders
  const filteredRem = failFilter ? reminders.filter(r=>r.failureReason===failFilter) : reminders;
  const critRem  = filteredRem.filter(r=>isRemCritical(r)).sort((a,b)=>a.apptMinutes-b.apptMinutes);
  const otherRem = filteredRem.filter(r=>!isRemCritical(r)).sort((a,b)=>a.apptMinutes-b.apptMinutes);

  const hasFilters = [fTopic,fSource,fIntent,fAgent,fPrio].some(f=>f!=='all');
  const fmtTs = ts.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  return (
    <>
      <div className="hd">
        <div className="hd-logo">
          <div className="hd-logo-mark">MF</div>
          <span className="hd-wordmark">MedForge</span>
        </div>
        <div className="hd-divider"/>
        <div className="hd-title">
          Bandeja Operacional
          <span>WhatsApp · CIVE</span>
        </div>
        <div className="hd-pills">
          {critical.length>0  && <span className="hd-pill critical">🔴 {critical.length} críticas</span>}
          {risk.length>0      && <span className="hd-pill risk">🟡 {risk.length} en riesgo</span>}
          {reminders.filter(r=>isRemCritical(r)).length>0 && (
            <span className="hd-pill reminder">📋 {reminders.filter(r=>isRemCritical(r)).length} recordatorios urgentes</span>
          )}
          {totalUnassigned>0  && <span className="hd-pill unassign">⚡ {totalUnassigned} sin asignar</span>}
          {normal.length>0    && <span className="hd-pill normal">{normal.length} normales</span>}
        </div>
        <span className="hd-ts">{fmtTs}</span>
        <button className={`hd-refresh ${spinning?'spinning':''}`} onClick={handleRefresh}>↻</button>
      </div>

      {/* Tabs */}
      <div className="tab-bar">
        <button className={`tab-btn ${activeTab==='oportunidades'?'active':''}`} onClick={()=>setActiveTab('oportunidades')}>
          Oportunidades calientes
          <span className={`tab-count ${activeTab==='oportunidades'?'tab-count-critical':''}`}>
            {critical.length+risk.length+normal.length}
          </span>
        </button>
        <button className={`tab-btn ${activeTab==='recordatorios'?'active':''}`} onClick={()=>setActiveTab('recordatorios')}>
          Recordatorios fallidos
          <span className={`tab-count ${activeTab==='recordatorios'?'tab-count-reminder':''}`}>
            {reminders.length}
          </span>
          {reminders.filter(r=>isRemCritical(r)).length>0 && (
            <span style={{fontSize:9,fontWeight:800,color:'#fca5a5',background:'rgba(220,38,38,.3)',padding:'1px 5px',borderRadius:99}}>
              {reminders.filter(r=>isRemCritical(r)).length} urgentes
            </span>
          )}
        </button>
      </div>

      {activeTab === 'oportunidades' && (
        <div className="fb">
          <label>Filtros:</label>
          <select value={fPrio}   onChange={e=>setFPrio(e.target.value)}>
            <option value="all">Prioridad</option>
            <option value="critical">Crítico</option>
            <option value="risk">En riesgo</option>
            <option value="normal">Normal</option>
          </select>
          <select value={fTopic}  onChange={e=>setFTopic(e.target.value)}>
            <option value="all">Topic</option>
            <option value="captacion_agendar">Captación agendar</option>
            <option value="agenda_sin_disponibilidad">Sin disponibilidad</option>
            <option value="faq_escalada">FAQ escalada</option>
            <option value="operacion_reagenda">Reagendamiento</option>
          </select>
          <select value={fSource} onChange={e=>setFSource(e.target.value)}>
            <option value="all">Origen</option>
            <option value="Ads">Ads</option>
            <option value="Orgánico">Orgánico</option>
            <option value="Retorno">Retorno</option>
            <option value="Campaña">Campaña</option>
          </select>
          <select value={fIntent} onChange={e=>setFIntent(e.target.value)}>
            <option value="all">Intención</option>
            <option value="agendar">Agendar</option>
            <option value="reagendar">Reagendar</option>
            <option value="información">Información</option>
          </select>
          <select value={fAgent}  onChange={e=>setFAgent(e.target.value)}>
            <option value="all">Agente</option>
            <option value="none">Sin asignar</option>
            {agents.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
          <div className="fb-sep"/>
          {hasFilters && <button className="fb-clear" onClick={()=>{setFTopic('all');setFSource('all');setFIntent('all');setFAgent('all');setFPrio('all');}}>✕ Limpiar</button>}
          <span style={{marginLeft:'auto',fontSize:10.5,color:'var(--gray-400)',fontFamily:'var(--mono)'}}>{filtered.length} / {convs.length}</span>
        </div>
      )}

      <div className="main">
        <div className="tp">

          {activeTab === 'oportunidades' && (
            <>
              {filtered.length === 0 ? (
                <div className="empty"><div className="empty-icon">🎉</div><h4>Sin oportunidades con estos filtros</h4><p>Ajusta los filtros o espera nuevas conversaciones</p></div>
              ) : (
                <>
                  <Section label="CRÍTICAS — acción inmediata" cls="sec-critical" items={critical}>
                    {critical.map(c=><OppCard key={c.id} conv={c} agents={agents} priority="critical" selected={selected} onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen}/>)}
                  </Section>
                  <Section label="EN RIESGO — responder pronto" cls="sec-risk" items={risk}>
                    {risk.map(c=><OppCard key={c.id} conv={c} agents={agents} priority="risk" selected={selected} onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen}/>)}
                  </Section>
                  <Section label="BAJO CONTROL" cls="sec-normal" items={normal}>
                    {normal.map(c=><OppCard key={c.id} conv={c} agents={agents} priority="normal" selected={selected} onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen}/>)}
                  </Section>
                </>
              )}
            </>
          )}

          {activeTab === 'recordatorios' && (
            <>
              <ContractNote/>
              <FailureSummary reminders={reminders} activeFilter={failFilter} onFilter={setFailFilter}/>

              <Section label="URGENTE — cita en menos de 2 horas" cls="sec-critical" items={critRem}>
                {critRem.map(r=><RemCard key={r.id} rem={r} agents={agents} selected={selected} onSelect={setSelected} onOpen={handleOpen} onAssign={handleAssign} addToast={addToast}/>)}
              </Section>
              <Section label="RECORDATORIOS FALLIDOS — cita posterior" cls="sec-reminder" items={otherRem}>
                {otherRem.map(r=><RemCard key={r.id} rem={r} agents={agents} selected={selected} onSelect={setSelected} onOpen={handleOpen} onAssign={handleAssign} addToast={addToast}/>)}
              </Section>

              {filteredRem.length===0 && (
                <div className="empty"><div className="empty-icon">✅</div><h4>Sin recordatorios fallidos{failFilter?' con este filtro':''}</h4></div>
              )}
            </>
          )}
        </div>

        <AgentPanel agents={agents}/>
      </div>

      <Toasts toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
