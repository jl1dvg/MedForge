<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oportunidades Calientes — MedForge CIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #1a2744;
  --navy-80:    #1a274499;
  --navy-light: #243256;
  --accent:     #2563eb;
  --accent-soft:#dbeafe;
  --red:        #dc2626;
  --red-soft:   #fef2f2;
  --red-mid:    #fecaca;
  --yellow:     #d97706;
  --yellow-soft:#fffbeb;
  --yellow-mid: #fde68a;
  --green:      #059669;
  --green-soft: #f0fdf4;
  --green-mid:  #bbf7d0;
  --gray-50:    #f8fafc;
  --gray-100:   #f1f5f9;
  --gray-200:   #e2e8f0;
  --gray-300:   #cbd5e1;
  --gray-400:   #94a3b8;
  --gray-500:   #64748b;
  --gray-600:   #475569;
  --gray-700:   #334155;
  --gray-800:   #1e293b;
  --mono:       'IBM Plex Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:  0 4px 12px rgba(0,0,0,.10);
  --shadow-lg:  0 8px 30px rgba(0,0,0,.14);
  --radius:     8px;
  --radius-sm:  5px;
  --radius-lg:  12px;
}

html, body { height: 100%; font-family: var(--sans); font-size: 13px; color: var(--gray-800); background: #eef2f7; }

#root { height: 100%; display: flex; flex-direction: column; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 99px; }

/* ── Header ── */
.hd {
  background: var(--navy);
  color: #fff;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.hd-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.hd-logo-mark {
  width: 28px; height: 28px;
  background: linear-gradient(135deg,#3b82f6,#1d4ed8);
  border-radius: 7px;
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: -.5px;
  color: #fff;
  box-shadow: 0 0 0 2px rgba(255,255,255,.15);
}
.hd-wordmark { font-size: 13px; font-weight: 600; letter-spacing: .3px; opacity: .9; }
.hd-divider { width: 1px; height: 22px; background: rgba(255,255,255,.18); flex-shrink: 0; }
.hd-title {
  font-size: 14px;
  font-weight: 500;
  opacity: .95;
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hd-title span { opacity: .5; font-size: 12px; }
.hd-pills { display: flex; gap: 6px; align-items: center; }
.hd-pill {
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11.5px;
  font-weight: 600;
  font-family: var(--mono);
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.hd-pill.critical { background: rgba(220,38,38,.25); color: #fca5a5; }
.hd-pill.risk     { background: rgba(217,119,6,.25);  color: #fcd34d; }
.hd-pill.normal   { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); }
.hd-pill.unassign { background: rgba(239,68,68,.35);  color: #fef2f2; border: 1px solid rgba(239,68,68,.5); }
.hd-ts { font-size: 11px; font-family: var(--mono); opacity: .45; white-space: nowrap; }
.hd-refresh {
  width: 30px; height: 30px;
  border: none;
  background: rgba(255,255,255,.1);
  border-radius: 7px;
  cursor: pointer;
  display: grid; place-items: center;
  color: rgba(255,255,255,.8);
  font-size: 15px;
  transition: background .15s, transform .3s;
  flex-shrink: 0;
}
.hd-refresh:hover { background: rgba(255,255,255,.18); }
.hd-refresh.spinning { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filter bar ── */
.fb {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 20px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  overflow-x: auto;
}
.fb label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.fb select {
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 12px;
  color: var(--gray-700);
  background: var(--gray-50);
  cursor: pointer;
  outline: none;
  transition: border-color .15s;
}
.fb select:focus { border-color: var(--accent); }
.fb-sep { width: 1px; height: 20px; background: var(--gray-200); flex-shrink: 0; }
.fb-clear {
  margin-left: auto;
  height: 28px;
  padding: 0 10px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 12px;
  color: var(--gray-500);
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.fb-clear:hover { background: var(--gray-100); color: var(--gray-700); }

/* ── Main layout ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 0;
  min-height: 0;
  overflow: hidden;
}

/* ── Table panel ── */
.tp {
  overflow-y: auto;
  background: var(--gray-50);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Section headers ── */
.sec-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 0;
}
.sec-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sec-hdr h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
}
.sec-hdr .sec-count {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 99px;
}
.sec-critical .sec-dot { background: var(--red); }
.sec-critical h3      { color: var(--red); }
.sec-critical .sec-count { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.sec-risk    .sec-dot { background: var(--yellow); }
.sec-risk    h3       { color: var(--yellow); }
.sec-risk    .sec-count { background: var(--yellow-soft); color: var(--yellow); border: 1px solid var(--yellow-mid); }
.sec-normal  .sec-dot { background: var(--green); }
.sec-normal  h3       { color: var(--green); }
.sec-normal  .sec-count { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-mid); }

/* ── Opportunity card ── */
.opp-card {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  overflow: hidden;
  transition: box-shadow .15s, transform .15s;
  cursor: pointer;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}
.opp-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.opp-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-md); }
.opp-card.critical { border-left: 3px solid var(--red); background: linear-gradient(to right, var(--red-soft) 0%, #fff 60%); }
.opp-card.risk     { border-left: 3px solid var(--yellow); background: linear-gradient(to right, var(--yellow-soft) 0%, #fff 60%); }
.opp-card.normal   { border-left: 3px solid var(--gray-200); }

.opp-body {
  padding: 11px 14px;
  display: grid;
  grid-template-columns: 200px 1fr 110px 130px 150px 140px 140px;
  gap: 10px;
  align-items: center;
  min-width: 0;
}

/* Col: Patient */
.col-patient { min-width: 0; }
.patient-name { font-weight: 600; font-size: 13px; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.patient-hc {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-top: 3px;
  padding: 1px 6px;
  background: var(--accent-soft);
  border: 1px solid #bfdbfe;
  border-radius: 4px;
  font-size: 10.5px;
  font-family: var(--mono);
  color: #1d4ed8;
  font-weight: 500;
}
.no-hc { font-size: 10.5px; color: var(--gray-400); margin-top: 3px; }

/* Col: Origin + Intent */
.col-origin { min-width: 0; }
.origin-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-source-ads      { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
.badge-source-organic  { background: #f0fdf4; color: #065f46; border: 1px solid #bbf7d0; }
.badge-source-return   { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
.badge-source-campaign { background: #fff7ed; color: #92400e; border: 1px solid #fed7aa; }
.badge-intent-booking   { background: var(--accent-soft); color: #1d4ed8; border: 1px solid #bfdbfe; }
.badge-intent-reschedule{ background: #fdf4ff; color: #7e22ce; border: 1px solid #e9d5ff; }
.badge-intent-cancel    { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.badge-intent-info      { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }

/* Col: Wait time */
.col-wait { text-align: center; }
.wait-badge {
  display: inline-flex; align-items: baseline; gap: 2px;
  padding: 4px 10px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  line-height: 1;
}
.wait-badge sub { font-size: 9px; opacity: .75; font-weight: 500; }
.wait-critical { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); }
.wait-risk     { background: var(--yellow-soft); color: var(--yellow); border: 1px solid var(--yellow-mid); }
.wait-ok       { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-mid); }
.wait-reason   { font-size: 10px; color: var(--gray-500); margin-top: 3px; text-align: center; }

/* Col: Topic */
.col-topic {}
.topic-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}
.topic-captacion   { background: var(--accent-soft); color: #1e40af; }
.topic-agenda_disp { background: #fff7ed; color: #92400e; }
.topic-faq         { background: var(--gray-100); color: var(--gray-600); }
.topic-operacion   { background: #fdf4ff; color: #6b21a8; }

/* Col: Meta window */
.col-meta { text-align: center; }
.meta-open   { font-size: 11px; color: var(--green); font-weight: 500; }
.meta-warn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  background: var(--yellow-soft);
  border: 1px solid var(--yellow-mid);
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  color: var(--yellow);
  white-space: nowrap;
}
.meta-critical-warn {
  background: var(--red-soft);
  border-color: var(--red-mid);
  color: var(--red);
}
.meta-label { font-size: 10px; color: var(--gray-400); margin-top: 2px; }

/* Col: Agent */
.col-agent { display: flex; align-items: center; gap: 7px; min-width: 0; }
.agent-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  position: relative;
}
.agent-avatar::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 2px solid #fff;
}
.agent-available::after { background: #22c55e; }
.agent-busy::after      { background: #ef4444; }
.agent-away::after      { background: #f59e0b; }
.unassigned-slot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px dashed var(--gray-300);
  display: grid; place-items: center;
  color: var(--gray-400);
  font-size: 14px;
  flex-shrink: 0;
}
.agent-name { font-size: 12px; font-weight: 500; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-status { font-size: 10.5px; color: var(--gray-400); }
.unassigned-label { font-size: 12px; color: var(--gray-400); font-style: italic; }

/* Col: Actions */
.col-actions { display: flex; align-items: center; gap: 5px; justify-content: flex-end; flex-wrap: nowrap; }
.btn {
  height: 28px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all .12s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  position: relative;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
.btn-secondary:hover { background: var(--gray-200); }
.btn-ghost { background: transparent; color: var(--accent); border: 1px solid #bfdbfe; }
.btn-ghost:hover { background: var(--accent-soft); }

/* Reasons strip */
.reasons-strip {
  padding: 5px 14px 8px 17px;
  border-top: 1px solid var(--gray-100);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  background: rgba(0,0,0,.015);
}
.reason-tag {
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 99px;
  font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.reason-critical { background: var(--red-soft); color: var(--red); }
.reason-warn     { background: var(--yellow-soft); color: var(--yellow); }
.reason-info     { background: var(--gray-100); color: var(--gray-600); }

/* ── Agent panel ── */
.ap {
  background: #fff;
  border-left: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.ap-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--gray-100);
  background: var(--navy);
  color: #fff;
}
.ap-header h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; opacity: .7; }
.ap-header p  { font-size: 13px; font-weight: 600; margin-top: 1px; }
.ap-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.agent-card {
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-100);
  background: var(--gray-50);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  align-items: center;
  transition: background .12s;
  cursor: pointer;
}
.agent-card:hover { background: var(--gray-100); }
.agent-card-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  color: #fff;
  position: relative;
  flex-shrink: 0;
}
.agent-card-avatar::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid #fff;
}
.ac-available::after { background: #22c55e; }
.ac-busy::after      { background: #ef4444; }
.ac-away::after      { background: #f59e0b; }
.agent-card-info { min-width: 0; }
.agent-card-name { font-size: 12.5px; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-card-status { font-size: 10.5px; margin-top: 1px; }
.ac-available-text { color: var(--green); font-weight: 500; }
.ac-busy-text      { color: var(--red); font-weight: 500; }
.ac-away-text      { color: var(--yellow); font-weight: 500; }
.agent-card-stats { text-align: right; flex-shrink: 0; }
.stat-conv { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--gray-800); line-height: 1; }
.stat-unread { font-size: 10px; color: var(--gray-400); }
.stat-resp { font-size: 10px; color: var(--gray-500); margin-top: 3px; }
.agent-load-bar { height: 3px; border-radius: 99px; background: var(--gray-200); margin-top: 5px; overflow: hidden; }
.agent-load-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.load-ok   { background: var(--green); }
.load-mid  { background: var(--yellow); }
.load-high { background: var(--red); }

.ap-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
}
.ap-footer-total { font-size: 11px; color: var(--gray-500); }
.ap-footer-total strong { color: var(--gray-800); font-weight: 700; }

/* ── Dropdown ── */
.dropdown-wrap { position: relative; }
.dropdown-menu {
  position: absolute;
  right: 0; top: calc(100% + 4px);
  z-index: 50;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  min-width: 200px;
  padding: 6px;
  animation: dropIn .12s ease both;
}
@keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.dropdown-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); padding: 4px 8px 6px; }
.dropdown-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .1s;
}
.dropdown-item:hover { background: var(--gray-100); }
.dropdown-item-load { font-size: 10px; font-family: var(--mono); color: var(--gray-500); }
.dropdown-div { height: 1px; background: var(--gray-100); margin: 4px 0; }

/* ── Toast ── */
.toast-wrap {
  position: fixed;
  bottom: 20px; right: 20px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  pointer-events: all;
  background: var(--navy-light);
  color: #fff;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 12.5px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn .2s ease both;
  border-left: 3px solid var(--accent);
}
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.toast-exit { animation: toastOut .2s ease forwards; }
@keyframes toastOut { to { opacity:0; transform:translateY(10px); } }

/* ── Score bar ── */
.score-mini { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.score-bar  { flex: 1; height: 3px; background: var(--gray-200); border-radius: 99px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 99px; }
.score-lbl  { font-size: 9.5px; font-family: var(--mono); font-weight: 600; }

/* ── Empty state ── */
.empty { text-align: center; padding: 48px 24px; color: var(--gray-400); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty h4 { font-size: 14px; font-weight: 600; color: var(--gray-600); }
.empty p  { font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useCallback } = React;

/* ── Mock data ── */
const AGENTS_RAW = [
  { id:1, name:'María López',    initials:'ML', color:'#e11d48', status:'busy',      convs:8,  unread:3, resp:'12 min' },
  { id:2, name:'Carlos Torres',  initials:'CT', color:'#2563eb', status:'available', convs:4,  unread:1, resp:'4 min'  },

/* ── Helpers ── */
function getPriority(conv) {
  if (!conv.agentId && conv.waitMin > 20) return 'critical';
  if (conv.metaState === 'critical') return 'critical';
  if (conv.requeued >= 2) return 'critical';
  if (!conv.agentId && conv.waitMin >= 5) return 'risk';
  if (conv.metaState === 'warn') return 'risk';
  return 'normal';
}

function agentColor(id, agents) {
  const a = agents.find(x => x.id === id);
  return a ? a.color : '#64748b';
}

function agentInitials(id, agents) {
  const a = agents.find(x => x.id === id);
  return a ? a.initials : '?';
}

function agentName(id, agents) {
  const a = agents.find(x => x.id === id);
  return a ? a.name : '—';
}

function agentStatus(id, agents) {
  const a = agents.find(x => x.id === id);
  return a ? a.status : '';
}

function loadPercent(convs, max=15) {
  return Math.min(100, Math.round(convs / max * 100));
}

function loadClass(pct) {
  if (pct >= 75) return 'load-high';
  if (pct >= 45) return 'load-mid';
  return 'load-ok';
}

function scoreColor(s) {
  if (s >= 80) return 'var(--red)';
  if (s >= 60) return 'var(--yellow)';
  return 'var(--green)';
}

function fmtMeta(conv) {
  if (conv.metaState === 'open') return null;
  const h = Math.floor(conv.metaMinLeft / 60);
  const m = conv.metaMinLeft % 60;
  if (h > 0) return `${h}h ${m}min`;
  return `${m} min`;
}

const TOPIC_LABELS = {
  captacion_agendar: 'captación',
  agenda_sin_disponibilidad: 'sin dispon.',
  faq_escalada: 'faq escalada',
  operacion_reagenda: 'reagenda',
};

const TOPIC_CLASS = {
  captacion_agendar: 'topic-captacion',
  agenda_sin_disponibilidad: 'topic-agenda_disp',
  faq_escalada: 'topic-faq',
  operacion_reagenda: 'topic-operacion',
};

const SOURCE_CLASS = {
  'Ads': 'badge-source-ads',
  'Orgánico': 'badge-source-organic',
  'Retorno': 'badge-source-return',
  'Campaña': 'badge-source-campaign',
};

const INTENT_CLASS = {
  'agendar': 'badge-intent-booking',
  'reagendar': 'badge-intent-reschedule',
  'cancelar': 'badge-intent-cancel',
  'información': 'badge-intent-info',
};

const SOURCE_EMOJI = { Ads:'📣', Orgánico:'🌿', Retorno:'🔄', Campaña:'📢' };
const INTENT_EMOJI = { agendar:'📅', reagendar:'🔃', cancelar:'✖️', información:'ℹ️' };

/* ── Dropdown ── */
function AgentDropdown({ agents, onSelect, onClose }) {
  const ref = useRef();
  useEffect(() => {
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) onClose(); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const sorted = [...agents].sort((a,b) => a.convs - b.convs);
  return (
    <div className="dropdown-menu" ref={ref}>
      <div className="dropdown-label">Asignar a agente</div>
      {sorted.map(a => (
        <div key={a.id} className="dropdown-item" onClick={() => onSelect(a)}>
          <div className="agent-avatar" style={{width:24,height:24,fontSize:9,background:a.color,position:'relative'}}>
            {a.initials}
            <span style={{
              position:'absolute',bottom:-1,right:-1,width:8,height:8,borderRadius:'50%',
              border:'1.5px solid #fff',
              background: a.status==='available'?'#22c55e':a.status==='busy'?'#ef4444':'#f59e0b'
            }}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--gray-800)'}}>{a.name}</div>
            <div style={{fontSize:10,color:'var(--gray-500)'}}>{a.convs} conv · {a.resp}</div>
          </div>
          <div className="dropdown-item-load">{a.convs}</div>
        </div>
      ))}
    </div>
  );
}

/* ── Reason tag ── */
function ReasonTag({ text, priority }) {
  const cls = priority === 'critical' ? 'reason-critical'
            : priority === 'risk'     ? 'reason-warn'
            : 'reason-info';
  const icon = priority === 'critical' ? '🔴'
             : priority === 'risk'     ? '🟡'
             : '⚪';
  return <span className={`reason-tag ${cls}`}>{icon} {text}</span>;
}

/* ── Opp Card ── */
function OppCard({ conv, agents, priority, selected, onSelect, onAssign, onOpen }) {
  const [showDrop, setShowDrop] = useState(false);
  const agent = agents.find(a => a.id === conv.agentId);
  const waitClass = priority === 'critical' ? 'wait-critical'
                  : priority === 'risk'     ? 'wait-risk'
                  : 'wait-ok';
  const metaFmt = fmtMeta(conv);
  const lp = loadPercent(conv.score);

  function handleAssign(a) {
    setShowDrop(false);
    onAssign(conv.id, a);
  }

  const reasonPriority = (r) => {
    if (r.includes('asignar') || r.includes('ventana') || r.includes('reencolado')) return priority;
    return 'info';
  };

  return (
    <div
      className={`opp-card ${priority} ${selected ? 'selected' : ''}`}
      onClick={() => onSelect(conv.id)}
      style={{ animationDelay: `${conv.id * 40}ms` }}
    >
      <div className="opp-body">

        {/* Patient */}
        <div className="col-patient">
          <div className="patient-name">{conv.name}</div>
          {conv.hc
            ? <div className="patient-hc">HC {conv.hc}</div>
            : <div className="no-hc">Sin HC</div>
          }
          <div className="score-mini">
            <div className="score-bar"><div className="score-fill" style={{width:`${conv.score}%`,background:scoreColor(conv.score)}}/></div>
            <span className="score-lbl" style={{color:scoreColor(conv.score)}}>{conv.score}</span>
          </div>
        </div>

        {/* Source + Intent */}
        <div className="col-origin">
          <div className="origin-row">
            <span className={`badge ${SOURCE_CLASS[conv.source]||'badge-intent-info'}`}>{SOURCE_EMOJI[conv.source]} {conv.source}</span>
            <span className={`badge ${INTENT_CLASS[conv.intent]||'badge-intent-info'}`}>{INTENT_EMOJI[conv.intent]} {conv.intent}</span>
          </div>
        </div>

        {/* Wait */}
        <div className="col-wait">
          <div className={`wait-badge ${waitClass}`}>{conv.waitMin}<sub>min</sub></div>
          <div className="wait-reason">en cola</div>
        </div>

        {/* Topic */}
        <div className="col-topic">
          <span className={`topic-badge ${TOPIC_CLASS[conv.topic]||'topic-faq'}`}>{TOPIC_LABELS[conv.topic]||conv.topic}</span>
          {conv.requeued >= 2 && (
            <div style={{fontSize:10,color:'var(--red)',marginTop:3,fontWeight:600}}>
              ↩ reencolado {conv.requeued}×
            </div>
          )}
        </div>

        {/* Meta window */}
        <div className="col-meta">
          {conv.metaState === 'open' && <div className="meta-open">✓ Abierta</div>}
          {conv.metaState === 'warn' && (
            <div className="meta-warn">⏱ {metaFmt}</div>
          )}
          {conv.metaState === 'critical' && (
            <div className="meta-warn meta-critical-warn">⚠ {metaFmt}</div>
          )}
          <div className="meta-label">ventana Meta</div>
        </div>

        {/* Agent */}
        <div className="col-agent">
          {agent ? (
            <>
              <div
                className={`agent-avatar agent-${agent.status}`}
                style={{background: agent.color}}
              >{agent.initials}</div>
              <div style={{minWidth:0}}>
                <div className="agent-name">{agent.name}</div>
                <div className="agent-status">{agent.convs} conv</div>
              </div>
            </>
          ) : (
            <>
              <div className="unassigned-slot">+</div>
              <span className="unassigned-label">Sin asignar</span>
            </>
          )}
        </div>

        {/* Actions */}
        <div className="col-actions" onClick={e => e.stopPropagation()}>
          <div className="dropdown-wrap">
            {!agent
              ? <button className="btn btn-primary" onClick={() => setShowDrop(v=>!v)}>Asignar ▾</button>
              : <button className="btn btn-secondary" onClick={() => setShowDrop(v=>!v)}>Reasignar ▾</button>
            }
            {showDrop && (
              <AgentDropdown agents={agents} onSelect={handleAssign} onClose={() => setShowDrop(false)} />
            )}
          </div>
          <button className="btn btn-ghost" onClick={() => onOpen(conv)}>Abrir</button>
        </div>
      </div>

      {/* Reasons */}
      {conv.reasons.length > 0 && (
        <div className="reasons-strip">
          {conv.reasons.map((r,i) => (
            <ReasonTag key={i} text={r} priority={reasonPriority(r)} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Section ── */
function Section({ label, cls, convs, agents, selected, onSelect, onAssign, onOpen }) {
  if (!convs.length) return null;
  return (
    <div>
      <div className={`sec-hdr ${cls}`}>
        <span className="sec-dot"/>
        <h3>{label}</h3>
        <span className="sec-count">{convs.length}</span>
      </div>
      <div style={{marginTop:6,display:'flex',flexDirection:'column',gap:6}}>
        {convs.map(c => (
          <OppCard key={c.id} conv={c} agents={agents} priority={cls.replace('sec-','')}
            selected={selected===c.id} onSelect={onSelect} onAssign={onAssign} onOpen={onOpen} />
        ))}
      </div>
    </div>
  );
}

/* ── Agent panel ── */
function AgentPanel({ agents, convs }) {
  const totalConvs = agents.reduce((s,a) => s + a.convs, 0);
  const totalUnread = agents.reduce((s,a) => s + a.unread, 0);
  return (
    <div className="ap">
      <div className="ap-header">
        <h4>Equipo activo</h4>
        <p>{agents.length} agentes</p>
      </div>
      <div className="ap-list">
        {[...agents].sort((a,b) => a.convs - b.convs).map(a => {
          const lp = loadPercent(a.convs);
          return (
            <div className="agent-card" key={a.id}>
              <div className={`agent-card-avatar ac-${a.status}`} style={{background:a.color}}>
                {a.initials}
              </div>
              <div className="agent-card-info">
                <div className="agent-card-name">{a.name}</div>
                <div className={`agent-card-status ac-${a.status}-text`}>
                  {a.status === 'available' ? '● Disponible'
                   : a.status === 'busy'    ? '● Ocupado'
                   : '● Ausente'}
                </div>
                <div className="agent-load-bar">
                  <div className={`agent-load-fill ${loadClass(lp)}`} style={{width:`${lp}%`}}/>
                </div>
              </div>
              <div className="agent-card-stats">
                <div className="stat-conv">{a.convs}</div>
                {a.unread > 0 && <div className="stat-unread">{a.unread} no leídas</div>}
                <div className="stat-resp">⏱ {a.resp}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="ap-footer">
        <div className="ap-footer-total">
          Total: <strong>{totalConvs}</strong> asignadas · <strong>{totalUnread}</strong> sin leer
        </div>
      </div>
    </div>
  );
}

/* ── Toast ── */
function Toasts({ toasts, onRemove }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.exit ? 'toast-exit' : ''}`}>
          <span>{t.icon}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [convs, setConvs] = useState(CONVS_RAW);
  const [agents, setAgents] = useState(AGENTS_RAW);
  const [selected, setSelected] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [ts, setTs] = useState(() => new Date());

  const [filterTopic,  setFilterTopic]  = useState('all');
  const [filterSource, setFilterSource] = useState('all');
  const [filterIntent, setFilterIntent] = useState('all');
  const [filterAgent,  setFilterAgent]  = useState('all');
  const [filterPrio,   setFilterPrio]   = useState('all');

  function addToast(msg, icon='✅') {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, icon}]);
    setTimeout(() => {
      setToasts(p => p.map(t => t.id===id ? {...t,exit:true} : t));
      setTimeout(() => setToasts(p => p.filter(t => t.id!==id)), 220);
    }, 3000);
  }

  function handleRefresh() {
    setSpinning(true);
    setTimeout(() => { setSpinning(false); setTs(new Date()); addToast('Bandeja actualizada','🔄'); }, 900);
  }

  function handleAssign(convId, agent) {
    setConvs(p => p.map(c => c.id===convId ? {...c, agentId:agent.id} : c));
    setAgents(p => p.map(a => a.id===agent.id ? {...a, convs:a.convs+1} : a));
    const conv = convs.find(c=>c.id===convId);
    addToast(`${conv?.name} asignada a ${agent.name}`,'👤');
  }

  function handleOpen(conv) {
    addToast(`Abriendo chat con ${conv.name}`,'💬');
  }

  const filtered = convs.filter(c => {
    if (filterTopic !== 'all'  && c.topic   !== filterTopic)  return false;
    if (filterSource !== 'all' && c.source  !== filterSource) return false;
    if (filterIntent !== 'all' && c.intent  !== filterIntent) return false;
    if (filterPrio !== 'all') {
      const p = getPriority(c);
      if (filterPrio !== p) return false;
    }
    if (filterAgent !== 'all') {
      if (filterAgent === 'none' && c.agentId !== null) return false;
      if (filterAgent !== 'none' && String(c.agentId) !== filterAgent) return false;
    }
    return true;
  });

  const critical = filtered.filter(c => getPriority(c) === 'critical').sort((a,b) => b.score-a.score);
  const risk     = filtered.filter(c => getPriority(c) === 'risk').sort((a,b) => b.score-a.score);
  const normal   = filtered.filter(c => getPriority(c) === 'normal').sort((a,b) => b.score-a.score);

  const totalUnassigned = convs.filter(c => !c.agentId).length;

  const fmtTs = ts.toLocaleTimeString('es-EC', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const clearFilters = () => { setFilterTopic('all'); setFilterSource('all'); setFilterIntent('all'); setFilterAgent('all'); setFilterPrio('all'); };
  const hasFilters = [filterTopic, filterSource, filterIntent, filterAgent, filterPrio].some(f => f!=='all');

  return (
    <>
      {/* Header */}
      <div className="hd">
        <div className="hd-logo">
          <div className="hd-logo-mark">MF</div>
          <span className="hd-wordmark">MedForge</span>
        </div>
        <div className="hd-divider"/>
        <div className="hd-title">
          Oportunidades Calientes
          <span>WhatsApp · CIVE</span>
        </div>
        <div className="hd-pills">
          {critical.length > 0 && <span className="hd-pill critical">🔴 {critical.length} críticas</span>}
          {risk.length > 0     && <span className="hd-pill risk">🟡 {risk.length} en riesgo</span>}
          {normal.length > 0   && <span className="hd-pill normal">{normal.length} normales</span>}
          {totalUnassigned > 0 && <span className="hd-pill unassign">⚡ {totalUnassigned} sin asignar</span>}
        </div>
        <span className="hd-ts">{fmtTs}</span>
        <button className={`hd-refresh ${spinning ? 'spinning' : ''}`} onClick={handleRefresh} title="Actualizar">↻</button>
      </div>

      {/* Filter bar */}
      <div className="fb">
        <label>Filtros:</label>
        <select value={filterPrio} onChange={e=>setFilterPrio(e.target.value)}>
          <option value="all">Prioridad</option>
          <option value="critical">Crítico</option>
          <option value="risk">En riesgo</option>
          <option value="normal">Normal</option>
        </select>
        <select value={filterTopic} onChange={e=>setFilterTopic(e.target.value)}>
          <option value="all">Topic</option>
          <option value="captacion_agendar">Captación agendar</option>
          <option value="agenda_sin_disponibilidad">Sin disponibilidad</option>
          <option value="faq_escalada">FAQ escalada</option>
          <option value="operacion_reagenda">Reagendamiento</option>
        </select>
        <select value={filterSource} onChange={e=>setFilterSource(e.target.value)}>
          <option value="all">Origen</option>
          <option value="Ads">Ads</option>
          <option value="Orgánico">Orgánico</option>
          <option value="Retorno">Retorno</option>
          <option value="Campaña">Campaña</option>
        </select>
        <select value={filterIntent} onChange={e=>setFilterIntent(e.target.value)}>
          <option value="all">Intención</option>
          <option value="agendar">Agendar</option>
          <option value="reagendar">Reagendar</option>
          <option value="información">Información</option>
        </select>
        <select value={filterAgent} onChange={e=>setFilterAgent(e.target.value)}>
          <option value="all">Agente</option>
          <option value="none">Sin asignar</option>
          {agents.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <div className="fb-sep"/>
        {hasFilters && (
          <button className="fb-clear" onClick={clearFilters}>✕ Limpiar filtros</button>
        )}
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--gray-400)',fontFamily:'var(--mono)'}}>
          {filtered.length} de {convs.length} conversaciones
        </span>
      </div>

      {/* Main */}
      <div className="main">
        <div className="tp">
          {filtered.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🎉</div>
              <h4>Sin oportunidades con estos filtros</h4>
              <p>Ajusta los filtros o espera nuevas conversaciones</p>
            </div>
          ) : (
            <>
              <Section label="CRÍTICAS — acción inmediata" cls="sec-critical"
                convs={critical} agents={agents} selected={selected}
                onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen} />
              <Section label="EN RIESGO — responder pronto" cls="sec-risk"
                convs={risk} agents={agents} selected={selected}
                onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen} />
              <Section label="BAJO CONTROL" cls="sec-normal"
                convs={normal} agents={agents} selected={selected}
                onSelect={setSelected} onAssign={handleAssign} onOpen={handleOpen} />
            </>
          )}
        </div>
        <AgentPanel agents={agents} convs={convs} />
      </div>

      <Toasts toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
