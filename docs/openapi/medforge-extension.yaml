openapi: 3.1.0
info:
  title: MedForge Extension Ingestion API
  description: >-
    Contrato oficial para los endpoints que consume la extensión CIVE al
    sincronizar prefacturas, consultas y actualizaciones de estado con la
    plataforma MedForge. El contrato define los formatos esperados y los códigos
    de respuesta estándar para facilitar pruebas automatizadas y evitar
    regresiones cuando se ajusta la extensión o el backend.
  version: 1.0.0
servers:
  - url: https://cive.consulmed.me
    description: Entorno productivo
  - url: http://localhost:8080
    description: Entorno local de pruebas
security:
  - ApiKeyAuth: []
paths:
  /api/prefactura/guardar.php:
    post:
      summary: Registrar o actualizar prefactura
      description: >-
        Inserta o actualiza los datos de una prefactura clínica, normalizando los
        procedimientos y diagnósticos asociados y registrando un evento de
        auditoría del payload recibido.
      operationId: guardarPrefactura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrefacturaRequest'
      responses:
        '200':
          description: Operación realizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrefacturaResponse'
        '400':
          description: Datos inválidos o JSON mal formado
        '401':
          description: Falta o es inválida la credencial de API
  /api/proyecciones/llegada.php:
    post:
      summary: Registrar llegada del paciente
      description: >-
        Actualiza el estado de agenda del formulario clínico y dispara las
        notificaciones asociadas a la llegada del paciente.
      operationId: registrarLlegada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstadoLlegadaRequest'
      responses:
        '200':
          description: Estado registrado correctamente
        '400':
          description: Petición inválida o falta form_id
        '401':
          description: Falta o es inválida la credencial de API
  /api/proyecciones/optometria.php:
    post:
      summary: Actualizar estado de optometría
      description: >-
        Marca el formulario clínico como atendido por optometría y registra un
        nuevo hito en el historial de estados.
      operationId: actualizarEstadoOptometria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstadoOptometriaRequest'
      responses:
        '200':
          description: Estado actualizado
        '400':
          description: Petición inválida
        '401':
          description: Falta o es inválida la credencial de API
  /api/consultas/guardar.php:
    post:
      deprecated: true
      summary: Guardar consulta clínica
      description: >-
        Endpoint legacy. Actualmente funciona como puente hacia
        `/v2/api/consultas/guardar.php`.
      operationId: guardarConsulta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaClinicaRequest'
      responses:
        '200':
          description: Consulta almacenada
        '400':
          description: Datos inválidos
        '401':
          description: Falta o es inválida la credencial de API
  /v2/api/consultas/guardar.php:
    post:
      summary: Guardar consulta clínica (v2)
      description: >-
        Endpoint canónico de Laravel v2 para persistir la información clínica
        detallada de una consulta externa.
      operationId: guardarConsultaV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaClinicaRequest'
      responses:
        '200':
          description: Consulta almacenada o validada con error de negocio
        '400':
          description: Datos inválidos
        '500':
          description: Error interno
  /v2/api/consultas/anterior.php:
    get:
      summary: Obtener consulta anterior (v2)
      description: >-
        Devuelve el último examen físico previo para el paciente, opcionalmente
        filtrado por familia de procedimiento y form_id actual.
      operationId: obtenerConsultaAnteriorV2
      parameters:
        - in: query
          name: hcNumber
          required: true
          schema:
            type: string
        - in: query
          name: form_id
          required: false
          schema:
            type: string
        - in: query
          name: procedimiento
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Resultado de consulta (con o sin datos)
        '500':
          description: Error interno
  /v2/api/consultas/plan.php:
    get:
      summary: Obtener plan de consulta (v2)
      operationId: obtenerPlanConsultaV2
      parameters:
        - in: query
          name: form_id
          required: false
          schema:
            type: string
        - in: query
          name: formId
          required: false
          schema:
            type: string
        - in: query
          name: hcNumber
          required: false
          schema:
            type: string
        - in: query
          name: hc_number
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Plan encontrado o mensaje de no encontrado
        '400':
          description: Parámetros faltantes
        '500':
          description: Error interno
    post:
      summary: Actualizar plan de consulta (v2)
      operationId: actualizarPlanConsultaV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - form_id
                - hcNumber
              properties:
                form_id:
                  type: string
                hcNumber:
                  type: string
                plan:
                  type: string
      responses:
        '200':
          description: Plan actualizado
        '400':
          description: Datos inválidos
        '500':
          description: Error interno
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    PrefacturaRequest:
      type: object
      required:
        - hcNumber
      properties:
        hcNumber:
          type: string
          description: Número de historia clínica del paciente
        form_id:
          type: string
          description: Identificador del formulario en SigCenter
        sede:
          type: string
        area:
          type: string
        afiliacion:
          type: string
        parentesco:
          type: string
        tipoAfiliacion:
          type: string
        numeroAprobacion:
          type: string
        tipoPlan:
          type: string
        fechaRegistro:
          type: string
          format: date-time
        fechaVigencia:
          type: string
          format: date-time
        codDerivacion:
          type: string
        numSecuencialDerivacion:
          type: string
        numHistoria:
          type: string
        examenFisico:
          type: string
        observacion:
          type: string
        procedimientos:
          type: array
          description: Lista de procedimientos proyectados o realizados
          items:
            $ref: '#/components/schemas/ProcedimientoItem'
        diagnosticos:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticoItem'
        derechos:
          type: array
          items:
            type: object
            additionalProperties: true
        insumos:
          type: array
          items:
            type: object
            additionalProperties: true
        oxigeno:
          type: array
          items:
            type: object
            additionalProperties: true
        anestesiaTiempo:
          type: array
          items:
            type: object
            additionalProperties: true
        source:
          type: string
          description: Origen del payload (por defecto `extension_cive`)
    ProcedimientoItem:
      type: object
      required:
        - procInterno
      properties:
        id:
          type: string
        procInterno:
          type: string
        procCodigo:
          type: string
        procDetalle:
          type: string
        procedimiento:
          type: string
        ojoId:
          type: string
        observaciones:
          type: string
        precioBase:
          type: string
          pattern: '^\\d+(\\.\\d{1,2})?$'
        procPrecio:
          type: string
          pattern: '^\\d+(\\.\\d{1,2})?$'
    DiagnosticoItem:
      type: object
      properties:
        idDiagnostico:
          type: string
        diagnostico:
          type: string
        descripcion:
          type: string
        ojo:
          type: string
        evidencia:
          type: string
        observaciones:
          type: string
    PrefacturaResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    EstadoLlegadaRequest:
      type: object
      required:
        - form_id
      properties:
        form_id:
          type: string
        hcNumber:
          type: string
        estado_agenda:
          type: string
          enum: [AGENDADO, LLEGADO, ATENDIDO]
        usuario:
          type: string
        observaciones:
          type: string
    EstadoOptometriaRequest:
      type: object
      required:
        - form_id
      properties:
        form_id:
          type: string
        estado_agenda:
          type: string
          enum: [OPTOMETRIA, ATENDIDO, CERRADO]
        usuario:
          type: string
        observaciones:
          type: string
    ConsultaClinicaRequest:
      type: object
      required:
        - hcNumber
        - form_id
      properties:
        hcNumber:
          type: string
        form_id:
          type: string
        examenFisico:
          type: string
        diagnosticos:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticoItem'
        planManejo:
          type: string
        observaciones:
          type: string
        usuario:
          type: string
